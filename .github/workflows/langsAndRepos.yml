name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 🔹 Top Languages
      - name: Generate top languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=github_dark
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Pinned repos (via curl)
      - name: Generate pinned repos
        run: |
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=Elaborato-informatica-Esame-di-stato-2019-20" -o profile/repo1.svg
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=Progetto-di-API-2022" -o profile/repo2.svg
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=Progetto-di-Reti-Logiche-2024" -o profile/repo3.svg
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=Progetto-di-TIW-2024" -o profile/repo4.svg
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=Progetto-di-Ingegneria-Informatica-2024" -o profile/repo5.svg
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=RASD-DD-Project-2025-Bellani-Capellino" -o profile/repo6.svg
          curl "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=FMCRS-Homework-Project-2025" -o profile/repo7.svg

      # 🔹 Commit
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
